name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Classifier contract drift check (US-22)
        run: bun run contract:check
      - name: Test
        run: bun test

  clean-system-install:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run install --apply against tmp settings
        run: bun run scripts/install.ts --apply --target /tmp/test-settings.json
      - name: Run doctor against tmp settings
        run: bun run scripts/doctor.ts --target /tmp/test-settings.json --verbose
      - name: Verify settings.json shape
        run: |
          python3 - <<'PY'
          import json, sys
          d = json.load(open("/tmp/test-settings.json"))
          assert "hooks" in d, "no hooks key"
          n = sum(len(v) for v in d["hooks"].values())
          assert n > 0, "no hook entries"
          print(f"OK: {n} hook entries wired")
          PY

  build-binary:
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build binary
        run: bun run build:bin
      - name: Smoke test (linux only — macOS sandbox kills unsigned compiled binaries)
        if: runner.os == 'Linux'
        run: |
          BIN=$(ls dist/claude-hook-*)
          chmod +x "$BIN"
          du -h "$BIN"
          echo '{"hook_event_name":"SessionStart","session_id":"ci","transcript_path":"/tmp/t","cwd":"/tmp","source":"startup","model":"opus"}' | "$BIN" SessionStart
      - name: Note macOS
        if: runner.os == 'macOS'
        run: |
          BIN=$(ls dist/claude-hook-*)
          du -h "$BIN"
          echo "macOS: built but not smoke-tested — unsigned binaries are killed by Gatekeeper. macOS users should install with --no-binary."
      - uses: actions/upload-artifact@v4
        with:
          name: claude-hook-${{ matrix.os }}
          path: dist/claude-hook-*
